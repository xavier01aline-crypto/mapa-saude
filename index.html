<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Medicina - Vera Cruz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <button onclick="showPage('home')">Início</button>
        <button onclick="showPage('diagnostica')">Medicina Diagnóstica</button>
        <button onclick="showPage('intervencionista')">Medicina Intervencionista</button>
    </nav>

    <section id="home" class="page active">
        <div class="hero">
            <h1>Bem-vinda, Aline</h1>
            <p>Selecione uma das áreas abaixo para visualizar os procedimentos.</p>
            <div class="main-cards">
                <div class="card" onclick="showPage('diagnostica')">Medicina Diagnóstica</div>
                <div class="card" onclick="showPage('intervencionista')">Medicina Intervencionista</div>
            </div>
        </div>
    </section>

    <section id="diagnostica" class="page">
        <h2>Medicina Diagnóstica</h2>
        <div class="grid-container">
            <div class="column">
                <h3>Anestesia</h3>
                <button onclick="openModal('Anestesia US', 'Explicaçăo sobre anestesia para Ultrassom...')">Anestesia US</button>
                <button onclick="openModal('Anestesia Tomo', 'Explicaçăo sobre anestesia para Tomografia...')">Anestesia Tomo</button>
                <button onclick="openModal('Anestesia RM', 'Anestesia para Ressonância...')">Anestesia RM</button>
            </div>
            <div class="column">
                <h3>Ressonância Magnética</h3>
                <button onclick="openModal('RM Cardio', 'Protocolos de RM Cardíaca...')">Cardio</button>
                <button onclick="openModal('RM Fetal', 'Protocolos de RM Fetal...')">Fetal</button>
                <button onclick="openModal('RM Neuro', 'Protocolos de RM Neurológica...')">Neuro</button>
            </div>
            </div>
    </section>

    <section id="intervencionista" class="page">
        <h2>Medicina Intervencionista</h2>
        <div class="grid-container">
            <div class="column">
                <h3>Procedimento Profundo</h3>
                <button onclick="openModal('Ablaçăo', 'Detalhes sobre Ablaçăo em Geral...')">Ablaçăo em Geral</button>
                <button onclick="openModal('Biópsia', 'Detalhes sobre Biópsia em Geral...')">Biópsia em Geral</button>
                <button onclick="openModal('Drenagem', 'Protocolos de Drenagem...')">Drenagem em Geral</button>
            </div>
            <div class="column">
                <h3>Procedimento em Mama</h3>
                <button onclick="openModal('Core Biopsy', 'Explicaçăo sobre Core Biopsy...')">Core Biopsy</button>
                <button onclick="openModal('Mamotomia', 'Explicaçăo sobre Mamotomia...')">Mamotomia</button>
            </div>
        </div>
    </section>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Título</h2>
            <p id="modal-text">Texto explicativo aqui...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

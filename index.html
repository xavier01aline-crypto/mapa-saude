<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicina Diagnóstica x Medicina Intervencionista - Vera Cruz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <button onclick="showPage('home')">Inicio</button>
        <button onclick="showPage('diagnostica')">Medicina Diagnostica</button>
        <button onclick="showPage('intervencionista')">Medicina Intervencionista</button>
    </nav>

    <section id="home" class="page active">
        <div style="text-align: center; padding: 50px;">
            <h1>Bem-vindo!!!</h1>
            <p>Selecione a área desejada para consultar os procedimentos e detalhes.</p>
        </div>
    </section>

    <section id="diagnostica" class="page">
        <h2>Medicina Diagnostica</h2>
        <div class="grid-container">
            <div class="column">
                <h3>Anestesia</h3>
                <button onclick="openModal('Anestesia US', 'Detalhes sobre Anestesia para exame de Ultrassom.')">Anestesia para Ultrassom</button>
                <button onclick="openModal('Anestesia Tomo', 'Detalhes sobre Anestesia para exame de Tomografia.')">Anestesia para Tomografia</button>
                <button onclick="openModal('Anestesia RM', 'Detalhes sobre Anestesia para exame de Ressonância.')">Anestesia para Ressonância</button>
            </div>
            <div class="column">
                <h3>Densitometria</h3>
                <button onclick="openModal('Avaliação VFL', 'Informações sobre Avaliação VFL.')">Avaliação VFL</button>
                <button onclick="openModal('Corpo Inteiro', 'Informações sobre Densitometria de Corpo Inteiro.')">Corpo Inteiro</button>
                <button onclick="openModal('Um Segmento', 'Informações sobre Um Segmento.')">Um Segmento</button>
                <button onclick="openModal('Dois Segmentos', 'Informações sobre Dois Segmentos.')">Dois Segmentos</button>
            </div>
            <div class="column">
                <h3>Mamografia</h3>
                <button onclick="openModal('Digital', 'Detalhes da Mamografia Digital.')">Mamografia Digital</button>
                <button onclick="openModal('Tomossíntese', 'Detalhes da Tomossíntese Mamária.')">Tomossíntese Mamária</button>
                <button onclick="openModal('Ampliação', 'Detalhes da Mamografia com Ampliação.')">Mama Ampliação</button>
            </div>
            <div class="column">
                <h3>Raio X</h3>
                <button onclick="openModal('Abdome', 'Protocolo de Raio X Abdome.')">Abdome</button>
                <button onclick="openModal('Coluna', 'Protocolo de Raio X Coluna.')">Coluna</button>
                <button onclick="openModal('Membro Inferior', 'Protocolo de Raio X Membro Inferior.')">Membro Inferior</button>
                <button onclick="openModal('Membro Superior', 'Protocolo de Raio X Membro Superior.')">Membro Superior</button>
                <button onclick="openModal('Torax', 'Protocolo de Raio X Tórax.')">Tórax</button>
            </div>
            <div class="column">
                <h3>Ressonância</h3>
                <button onclick="openModal('RM Cardio', 'Protocolo RM Cardíaca.')">Cardio</button>
                <button onclick="openModal('RM Fetal', 'Protocolo RM Fetal.')">Fetal</button>
                <button onclick="openModal('RM Medicina Interna', 'Protocolo RM Medicina Interna.')">Medicina Interna</button>
                <button onclick="openModal('RM Neuro', 'Protocolo RM Neuro.')">Neuro</button>
            </div>
        </div>
    </section>

    <section id="intervencionista" class="page">
        <h2>Medicina Intervencionista</h2>
        <div class="grid-container">
            <div class="column">
                <h3>Superficial</h3>
                <button onclick="openModal('PAAF Superficial', 'Detalhes sobre PAAF Superficial.')">PAAF Superficial</button>
            </div>
            <div class="column">
                <h3>Profundo</h3>
                <button onclick="openModal('Ablação', 'Procedimento de Ablação em Geral.')">Ablação em Geral</button>
                <button onclick="openModal('Biópsia', 'Procedimento de Biópsia em Geral.')">Biópsia em Geral</button>
                <button onclick="openModal('Nefrostomia', 'Procedimento de Nefrostomia.')">Nefrostomia</button>
                <button onclick="openModal('Paracentese', 'Procedimento de Paracentese.')">Paracentese</button>
            </div>
            <div class="column">
                <h3>Mama</h3>
                <button onclick="openModal('Core Biopsy', 'Procedimento de Core Biopsy.')">Core Biopsy</button>
                <button onclick="openModal('Mamotomia', 'Procedimento de Mamotomia.')">Mamotomia</button>
                <button onclick="openModal('Marcação', 'Procedimento de Marcação.')">Marcação</button>
                <button onclick="openModal('PAAF Mama', 'Procedimento de PAAF em Mama.')">PAAF em Mama</button>
            </div>
            <div class="column">
                <h3>Próstata</h3>
                <button onclick="openModal('Transretal Simples', 'Próstata Transretal Simples.')">Transretal Simples</button>
                <button onclick="openModal('Transretal com Fusão', 'Próstata Transretal com Fusão.')">Transretal com Fusão</button>
                <button onclick="openModal('Transperineal Particular', 'Próstata Transperineal Particular.')">Transperineal Particular</button>
            </div>
        </div>
    </section>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
